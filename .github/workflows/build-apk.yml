name: Build & Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    name: 🔨 Build APK
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: 🧹 Clean install
        run: |
          rm -rf node_modules package-lock.json
          npm install --legacy-peer-deps --no-save
      
      - name: 🏗️ Build web
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      
      - name: 📱 Setup Capacitor
        run: |
          npx cap add android 2>/dev/null || true
          npx cap sync android
      
      - name: 📦 Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
      
      - name: 🔍 Find APK
        id: apk
        run: |
          APK=$(find android/app/build/outputs/apk -name "*.apk" -type f | head -1)
          if [ ! -z "$APK" ]; then
            echo "path=$APK" >> $GITHUB_OUTPUT
            echo "name=$(basename $APK)" >> $GITHUB_OUTPUT
            echo "✅ Found: $APK"
          else
            echo "❌ APK not found!"
            find android/app/build/outputs -type f -name "*.apk" 2>/dev/null || true
            exit 1
          fi
      
      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: E-Moments-APK-${{ github.run_number }}
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30
      
      - name: 🚀 Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.path }}
          tag_name: v${{ github.run_number }}
          name: E. Moments v${{ github.run_number }}
          body: |
            # 📱 E. Moments APK v${{ github.run_number }}
            
            ## 📥 ഡൗൺലോഡ് ചെയ്യുക
            **[⬇️ APK ഡൗൺലോഡ് ചെയ്യുക](https://github.com/${{ github.repository }}/releases/download/v${{ github.run_number }}/${{ steps.apk.outputs.name }})**
            
            ## 📋 വിവരങ്ങൾ
            - **Commit**: [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
            - **Branch**: `${{ github.ref_name }}`
            
            ## 🚀 ഇൻസ്റ്റാൾ ചെയ്യുക
            
            ### വിധി 1: USB ഡീബഗിംഗ (ഉപയോഗിക്കാൻ ദ്രുതതം)
            ```bash
            adb install "${{ steps.apk.outputs.name }}"
            ```
            
            ### വിധി 2: ഫോണിൽ നേരിട്ട് ഇൻസ്റ്റാൾ
            1. ഡൗൺലോഡ് ചെയ്യുക
            2. ഫോണിൽ തുറക്കുക
            3. "ഇൻസ്റ്റാൾ" ടാപ് ചെയ്യുക
            
            ## ℹ️ വിവരങ്ങൾ
            - **App**: E. Moments
            - **Package**: com.emoments.app
            - **Min Android**: 6.0+
            
            ---
            **✨ GitHub Actions വഴി സ്വയമായി നിർമ്മിച്ചത്**
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: ✅ Success
        run: echo "🎉 APK നിർമ്മാണം സഫലമായി!"
