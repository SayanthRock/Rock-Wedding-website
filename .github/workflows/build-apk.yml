name: Build APK & Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install dependencies
        run: npm install
      
      - name: Build web
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      
      - name: Add Android platform
        run: npx cap add android
      
      - name: Sync Capacitor
        run: npx cap sync android
      
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
      
      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_apk
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
      
      - name: Rename APK
        run: |
          mv ${{ steps.sign_apk.outputs.signedReleaseFile }} app-release-${{ github.run_number }}.apk
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app-release-${{ github.run_number }}.apk
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            ## APK Build #${{ github.run_number }}
            
            **Download APK:** [app-release-${{ github.run_number }}.apk](https://github.com/${{ github.repository }}/releases/download/v${{ github.run_number }}/app-release-${{ github.run_number }}.apk)
            
            **Built from:**
            - Commit: ${{ github.sha }}
            - Branch: ${{ github.ref_name }}
            - Time: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
            
            **Changes:**
            https://github.com/${{ github.repository }}/commits/${{ github.sha }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
