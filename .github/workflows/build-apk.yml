name: Build APK & Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Clean install
        run: |
          rm -rf node_modules package-lock.json
          npm install
      
      - name: Build web
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      
      - name: Add Android platform
        run: npx cap add android || true
      
      - name: Sync Capacitor
        run: npx cap sync android || true
      
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
        continue-on-error: true
      
      - name: Find APK
        id: find_apk
        run: |
          APK_PATH=$(find android/app/build/outputs/apk -name "*.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "APK_PATH=android/app/build/outputs/apk/debug/app-debug.apk" >> $GITHUB_OUTPUT
          else
            echo "APK_PATH=$APK_PATH" >> $GITHUB_OUTPUT
          fi
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          files: ${{ steps.find_apk.outputs.APK_PATH }}
          tag_name: v${{ github.run_number }}
          name: E. Moments v${{ github.run_number }}
          body: |
            ## 📱 APK Release v${{ github.run_number }}
            
            **Download:** [E. Moments APK](https://github.com/${{ github.repository }}/releases/download/v${{ github.run_number }}/app-debug.apk)
            
            **Build Info:**
            - Commit: [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
            - Branch: `${{ github.ref_name }}`
            
            **Installation:**
            ```bash
            adb install app-debug.apk
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
