name: Build & Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build APK
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install dependencies
        run: npm ci
        continue-on-error: false
      
      - name: Build web assets
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      
      - name: Initialize Capacitor Android
        run: |
          npx cap add android 2>/dev/null || true
          npx cap sync android
      
      - name: Build Debug APK
        if: github.event_name == 'push' || github.event.inputs.build_type == 'debug'
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
      
      - name: Build Release APK
        if: github.event.inputs.build_type == 'release'
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
      
      - name: Find built APK
        id: apk
        run: |
          if [ -f "android/app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "path=android/app/build/outputs/apk/debug/app-debug.apk" >> $GITHUB_OUTPUT
            echo "name=app-debug.apk" >> $GITHUB_OUTPUT
          elif [ -f "android/app/build/outputs/apk/release/app-release.apk" ]; then
            echo "path=android/app/build/outputs/apk/release/app-release.apk" >> $GITHUB_OUTPUT
            echo "name=app-release.apk" >> $GITHUB_OUTPUT
          else
            echo "ERROR: APK not found!"
            find android/app/build/outputs -name "*.apk" -type f
            exit 1
          fi
      
      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: E-Moments-APK-${{ github.run_number }}
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30
      
      - name: Create Release and Upload APK
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ github.run_number }}
          name: E. Moments v${{ github.run_number }}
          artifacts: ${{ steps.apk.outputs.path }}
          body: |
            # 📱 E. Moments - APK Release v${{ github.run_number }}
            
            ## 📥 Download
            **[E. Moments APK v${{ github.run_number }}](https://github.com/${{ github.repository }}/releases/download/v${{ github.run_number }}/${{ steps.apk.outputs.name }})**
            
            ## 📋 Build Information
            - **Build Type**: ${{ github.event.inputs.build_type || 'debug' }}
            - **Commit**: [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
            - **Branch**: `${{ github.ref_name }}`
            - **Built at**: ${{ github.event.head_commit.timestamp }}
            
            ## 🚀 Installation
            
            ### Option 1: Via ADB (Fastest)
            ```bash
            adb install ${{ steps.apk.outputs.name }}
            ```
            
            ### Option 2: Manual Installation
            1. Download the APK file from above
            2. Transfer to your Android device
            3. Open file manager and tap the APK
            4. Follow prompts to install
            
            ### Option 3: USB Installation
            ```bash
            adb devices
            adb install -r ${{ steps.apk.outputs.name }}
            ```
            
            ## ℹ️ App Details
            - **App Name**: E. Moments
            - **Package**: com.emoments.app
            - **Min Android Version**: 6.0 (API 24)
            - **Target Android Version**: 14 (API 34)
            
            ## 📞 Support
            - Report issues: [GitHub Issues](https://github.com/${{ github.repository }}/issues)
            - View changes: [Commits](https://github.com/${{ github.repository }}/commits/${{ github.sha }})
            
            ---
            *Built automatically by GitHub Actions*
          draft: false
          prerelease: false
          allowUpdates: false
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Post release link
        run: |
          echo "✅ APK Successfully Built & Released!"
          echo "📱 Download: https://github.com/${{ github.repository }}/releases/tag/v${{ github.run_number }}"
          echo "📦 File: ${{ steps.apk.outputs.name }}"
