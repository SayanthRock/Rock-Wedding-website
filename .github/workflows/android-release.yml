name: Android Release Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Android artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install web dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Prepare Android signing
        shell: bash
        env:
          SIGNING_KEY_STORE_BASE64: ${{ secrets.SIGNING_KEY_STORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          mkdir -p android/app

          if [[ -n "${SIGNING_KEY_STORE_BASE64:-}" && -n "${RELEASE_STORE_PASSWORD:-}" && -n "${RELEASE_KEY_ALIAS:-}" && -n "${RELEASE_KEY_PASSWORD:-}" ]]; then
            echo "$SIGNING_KEY_STORE_BASE64" | base64 --decode > android/app/release-keystore.jks
            echo "SIGNING_STORE_FILE=release-keystore.jks" >> "$GITHUB_ENV"
            echo "SIGNING_STORE_PASSWORD=$RELEASE_STORE_PASSWORD" >> "$GITHUB_ENV"
            echo "SIGNING_KEY_ALIAS=$RELEASE_KEY_ALIAS" >> "$GITHUB_ENV"
            echo "SIGNING_KEY_PASSWORD=$RELEASE_KEY_PASSWORD" >> "$GITHUB_ENV"
            echo "Using release signing secrets. Humanity has briefly avoided chaos."
          else
            keytool -genkeypair \
              -v \
              -keystore android/app/ci-release.keystore \
              -storepass android \
              -keypass android \
              -alias androiddebugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Rock Wedding CI,O=SayanthRock,C=IN" \
              -noprompt
            echo "SIGNING_STORE_FILE=ci-release.keystore" >> "$GITHUB_ENV"
            echo "SIGNING_STORE_PASSWORD=android" >> "$GITHUB_ENV"
            echo "SIGNING_KEY_ALIAS=androiddebugkey" >> "$GITHUB_ENV"
            echo "SIGNING_KEY_PASSWORD=android" >> "$GITHUB_ENV"
            echo "Release signing secrets are incomplete, so a CI fallback key was generated. Add real secrets for Play Store-ready releases."
          fi

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build APK
        working-directory: android
        run: bash ./gradlew --no-daemon assembleRelease

      - name: Build AAB
        working-directory: android
        run: bash ./gradlew --no-daemon bundleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rock-wedding-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: rock-wedding-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: rock-wedding-release-apk
          path: ./apk

      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: rock-wedding-release-aab
          path: ./aab

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./apk/*.apk
            ./aab/*.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
