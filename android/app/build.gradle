plugins {
    id 'com.android.application'
}

android {
    namespace 'com.emoments.app'
    compileSdk 34

    defaultConfig {
        applicationId 'com.emoments.app'
        minSdk 24
        targetSdk 34
        versionCode System.getenv('GITHUB_RUN_NUMBER')?.toInteger() ?: 1
        versionName '1.0.0'
    }

    buildTypes {
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            debuggable true
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'com.getcapacitor:core:8.3.4'
}
